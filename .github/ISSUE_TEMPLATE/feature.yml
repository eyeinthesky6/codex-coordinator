name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Coordination problem
      description: What user-visible problem needs solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Smallest useful change
      description: Describe the simplest behavior that would help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain any current workaround or simpler option.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request is project-agnostic and does not include private task data.
          required: true
