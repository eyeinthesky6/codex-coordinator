name: Property tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  handover-properties:
    name: Handover properties on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-property-tests.txt
      - name: Install property-test dependency
        run: python -m pip install --requirement requirements-property-tests.txt
      - name: Run generated handover sequences
        run: python -m unittest discover -s tests -p "test_handover_properties.py" -v
