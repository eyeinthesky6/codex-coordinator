name: Property tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  handover-properties:
    name: Handover properties on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-property-tests.txt
      - name: Install property-test dependency
        run: python -m pip install --requirement requirements-property-tests.txt
      - name: Run generated handover sequences
        run: python -m unittest discover -s tests -p "test_handover_properties.py" -v
